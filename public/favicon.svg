<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Link Gradient: Premium Tech Blue/Cyan matching Quantix aesthetics -->
    <linearGradient id="link" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/> 
      <stop offset="100%" stop-color="#2dd4bf"/> 
    </linearGradient>
    
    <!-- Subtle glow to make the icon pop -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0ea5e9" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Rescaled API Link Path over transparent background -->
  <g transform="translate(6, 6) scale(3.6)" filter="url(#glow)">
    <path fill="none" stroke="url(#link)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
    <path fill="none" stroke="url(#link)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
  </g>
</svg>
